<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Genesis Forestry — Field Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--black:#080a07;--deep:#0e1209;--panel:#141a0f;--card:#1a2214;--border:#253020;--moss:#3d4a2e;--pine:#4a6741;--leaf:#6b9e5e;--bright:#8dc97c;--gold:#c9a84c;--cream:#ddd8c4;--muted:#7a8470;--red:#b83232;--orange:#c97a2b;--blue:#4a7fa0;--bl:#6ba3c4;--mono:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--cream);font-family:'Barlow',sans-serif;min-height:100vh;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(37,48,32,.3) 59px,rgba(37,48,32,.3) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(37,48,32,.12) 59px,rgba(37,48,32,.12) 60px);}
#loading-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-logo{width:80px;height:80px;overflow:hidden;border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(141,201,124,.15);}50%{box-shadow:0 0 50px rgba(141,201,124,.4);}}
.loading-text{font-family:var(--mono);font-size:11px;letter-spacing:4px;color:var(--muted);margin-top:14px;}
#login-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.login-logo{width:78px;height:78px;overflow:hidden;border-radius:50%;margin-bottom:12px;box-shadow:0 0 40px rgba(141,201,124,.18);}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:5px;color:white;margin-bottom:2px;}
.login-sub{font-family:var(--mono);font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--leaf);margin-bottom:24px;}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:22px 18px;width:100%;max-width:360px;}
.login-label{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--leaf);margin-bottom:8px;display:block;}
.name-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;}
.name-btn{background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 3px;border-radius:3px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.name-btn:hover{border-color:var(--pine);color:var(--bright);}
.name-btn.selected{border-color:var(--bright);background:rgba(141,201,124,.08);color:var(--bright);}
.pfp-emoji{display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--moss);flex-shrink:0;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.login-btn{width:100%;background:var(--pine);border:none;color:white;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:4px;padding:12px;border-radius:3px;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--leaf);}
.mgmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mgmt-btn{background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;padding:12px;border-radius:3px;cursor:pointer;transition:all .2s;width:100%;}
.mgmt-btn:hover{border-color:var(--pine);color:var(--bright);}
#pin-section{display:none;}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:14px;}
.pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--muted);background:transparent;transition:background .15s;}
.pin-dot.filled{background:var(--bright);border-color:var(--bright);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.pin-key{background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:20px;padding:12px;border-radius:3px;cursor:pointer;text-align:center;transition:all .1s;}
.pin-key:hover{border-color:var(--bright);color:var(--bright);}
.pin-key:active{transform:scale(.95);}
.pin-key.clr{color:var(--red);font-family:var(--mono);font-size:9px;letter-spacing:1px;}
.pin-error{color:var(--red);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:7px;min-height:14px;}
#pfp-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:20px;}
#pfp-modal.show{display:flex;}
.pfp-modal-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:22px 18px;max-width:300px;width:100%;text-align:center;}
.pfp-modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:white;margin-bottom:3px;}
.pfp-modal-sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
.pfp-big-emoji{width:72px;height:72px;border-radius:50%;margin:0 auto 11px;border:2px solid var(--border);background:var(--moss);display:flex;align-items:center;justify-content:center;font-size:32px;}
.pfp-big-img{width:72px;height:72px;border-radius:50%;margin:0 auto 11px;border:2px solid var(--border);object-fit:cover;display:none;}
.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:11px;}
.emoji-opt{background:var(--card);border:2px solid var(--border);border-radius:5px;font-size:19px;padding:6px;cursor:pointer;transition:all .15s;text-align:center;}
.emoji-opt:hover{border-color:var(--pine);}
.emoji-opt.selected{border-color:var(--bright);background:rgba(141,201,124,.1);}
.pfp-upload-label{display:block;background:var(--card);border:1px dashed var(--border);border-radius:3px;padding:8px;cursor:pointer;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.pfp-upload-label:hover{border-color:var(--leaf);color:var(--cream);}
#pfp-file-input{display:none;}
#app-shell{display:none;}
header{background:var(--deep);border-bottom:2px solid var(--moss);padding:0 12px;position:sticky;top:0;z-index:100;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;height:56px;}
.logo-wrap{width:34px;height:34px;overflow:hidden;border-radius:50%;flex-shrink:0;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:white;line-height:1;text-align:center;}
.brand-sub{font-family:var(--mono);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--leaf);text-align:center;}
.header-right{display:flex;align-items:center;gap:7px;}
.user-badge{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:3px;padding:4px 8px;cursor:pointer;}
.user-badge:hover{border-color:var(--moss);}
.badge-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;}
.badge-role{font-family:var(--mono);font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);}
.badge-role.staff{color:var(--leaf);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:4px 7px;border-radius:3px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--bright);box-shadow:0 0 5px var(--bright);flex-shrink:0;}
.online-dot.offline{background:var(--red);box-shadow:0 0 5px var(--red);}
.nav-tabs{display:flex;background:var(--deep);border-bottom:1px solid var(--border);padding:0 4px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:10px 10px 8px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab-btn:hover{color:var(--cream);}
.tab-btn.active{color:var(--bright);border-bottom-color:var(--bright);}
.tab-btn.hidden{display:none;}
.nbadge{display:inline-block;background:var(--orange);color:white;font-size:7px;font-family:var(--mono);padding:1px 4px;border-radius:6px;margin-left:3px;vertical-align:middle;}
main{max-width:960px;margin:0 auto;padding:12px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:4px;color:white;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'//';font-family:var(--mono);font-size:10px;color:var(--pine);letter-spacing:0;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.hero-block{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--bright);border-radius:3px;padding:16px 12px;text-align:center;margin-bottom:9px;}
.hero-label{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--leaf);margin-bottom:3px;}
.hero-num{font-family:'Bebas Neue',sans-serif;font-size:68px;color:var(--bright);line-height:.9;letter-spacing:4px;}
.hero-sub{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.hero-stats{display:flex;justify-content:space-around;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.hs-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);line-height:1;text-align:center;}
.hs-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;}
.ops-strip{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.ops-chip{background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--blue);border-radius:3px;padding:9px 11px;}
.ops-chip.gold{border-left-color:var(--gold);}
.ops-chip-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--bl);line-height:1;}
.ops-chip.gold .ops-chip-val{color:var(--gold);}
.ops-chip-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.verse-card{background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:3px;padding:11px 13px;margin-bottom:9px;position:relative;overflow:hidden;}
.verse-card::after{content:'✝';position:absolute;font-size:42px;opacity:.05;right:8px;top:-2px;line-height:1;}
.verse-label{font-family:var(--mono);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.verse-text{font-size:12px;line-height:1.6;color:var(--cream);font-style:italic;margin-bottom:4px;}
.verse-ref{font-family:var(--mono);font-size:8px;color:var(--leaf);}
.pill{display:inline-block;font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;}
.pill-pending{background:rgba(201,122,43,.2);color:var(--orange);border:1px solid var(--orange);}
.pill-approved{background:rgba(74,103,65,.3);color:var(--bright);border:1px solid var(--pine);}
.pill-rejected{background:rgba(184,50,50,.15);color:var(--red);border:1px solid var(--red);}
.job-type-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:13px;}
.jt-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;padding:10px 3px;border-radius:3px;cursor:pointer;transition:all .2s;text-align:center;}
.jt-btn:hover{border-color:var(--moss);color:var(--cream);}
.jt-btn.ap{border-color:var(--bright);color:var(--bright);background:rgba(141,201,124,.07);}
.jt-btn.as{border-color:var(--bl);color:var(--bl);background:rgba(74,127,160,.07);}
.jt-btn.aw{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07);}
.job-form{display:none;}
.job-form.active{display:block;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--leaf);}
input,select,textarea{background:var(--panel);border:1px solid var(--border);color:var(--cream);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 11px;border-radius:3px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--pine);}
input[type="date"]{cursor:pointer;color-scheme:dark;}
select option{background:var(--panel);}
.big-wrap{position:relative;}
.big-wrap input[type="number"]{font-family:'Bebas Neue',sans-serif;font-size:42px;text-align:center;padding:13px;letter-spacing:3px;}
.big-wrap.green input{color:var(--bright);}
.big-wrap.blue input{color:var(--bl);}
.big-wrap.gold input{color:var(--gold);}
.unit-sfx{position:absolute;right:9px;bottom:9px;font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.submit-btn{width:100%;background:var(--pine);border:none;color:white;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;padding:13px;border-radius:3px;cursor:pointer;transition:all .2s;}
.submit-btn:hover{background:var(--leaf);}
.submit-btn:disabled{background:var(--moss);cursor:not-allowed;opacity:.6;}
.sblu{background:#1e4a6a;}.sblu:hover{background:var(--blue);}
.sgld{background:#5a4a10;}.sgld:hover{background:#8a6a20;}
.crew-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:2px;}
.crew-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 3px;border-radius:3px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;user-select:none;}
.crew-btn:hover{border-color:var(--blue);color:var(--bl);}
.crew-btn.on{border-color:var(--bl);background:rgba(74,127,160,.1);color:var(--bl);}
.entry-row{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:9px 11px;margin-bottom:5px;}
.entry-row.pr{border-left:2px solid var(--pine);}
.entry-row.sr{border-left:2px solid var(--blue);}
.entry-row.wr{border-left:2px solid var(--gold);}
.er-date{font-family:var(--mono);font-size:8px;color:var(--muted);min-width:62px;}
.er-who{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;min-width:44px;}
.er-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--bright);min-width:36px;}
.er-val.bv{color:var(--bl);}
.er-val.gv{color:var(--gold);}
.er-loc{font-size:10px;color:var(--muted);flex:1;}
.no-data{color:var(--muted);font-style:italic;font-size:12px;text-align:center;padding:16px;}
.lb-row{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:10px 13px;margin-bottom:5px;}
.lb-row.r1{border-color:#a08030;}
.lb-row.r2{border-color:#707878;}
.lb-row.r3{border-color:#705040;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:26px;text-align:center;color:var(--muted);flex-shrink:0;}
.r1 .lb-rank{color:var(--gold);}
.r2 .lb-rank{color:#aab8b8;}
.r3 .lb-rank{color:#b08060;}
.lb-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;flex:1;color:white;}
.lb-bar-wrap{flex:2;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.lb-bar{height:100%;background:linear-gradient(90deg,var(--pine),var(--bright));border-radius:2px;transition:width .8s ease;}
.lb-count{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--bright);width:60px;text-align:right;}
.lb-sub{font-family:var(--mono);font-size:7px;color:var(--muted);width:26px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:13px;text-align:center;}
.stat-card-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--bright);line-height:1;}
.stat-card-lbl{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.person-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.ps-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:11px;}
.ps-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ps-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:white;}
.ps-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.ps-row:last-child{border-bottom:none;}
.ps-k{font-family:var(--mono);font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.ps-v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--cream);}
.ps-v.big{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--bright);}
.attend-bar-wrap{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.attend-bar{height:100%;background:linear-gradient(90deg,var(--pine),var(--bright));border-radius:2px;}
.spray-sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.spray-stat{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--blue);border-radius:3px;padding:11px;text-align:center;}
.spray-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--bl);line-height:1;}
.spray-stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.spray-op-row{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--blue);border-radius:3px;padding:8px 11px;margin-bottom:5px;}
.spray-op-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;flex:1;}
.spray-op-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--bl);}
.spray-op-sub{font-family:var(--mono);font-size:7px;color:var(--muted);margin-left:3px;}
.filter-bar{display:flex;gap:7px;margin-bottom:11px;}
.filter-bar select{flex:1;}
.cal-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.cal-nav{background:var(--panel);border:1px solid var(--border);color:var(--cream);font-size:17px;width:32px;height:32px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nav:hover{border-color:var(--pine);color:var(--bright);}
.cal-month-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:4px;color:white;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:11px;}
.cal-day-hdr{font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;padding:5px 0;}
.cal-day{aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.cal-day:hover{border-color:var(--pine);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.today{border-color:var(--leaf);}
.cal-day.has-data{background:var(--card);}
.cal-day.selected{border-color:var(--bright);background:rgba(141,201,124,.08);}
.cal-day-num{font-weight:600;color:var(--cream);font-size:11px;}
.cal-day-trees{font-family:'Bebas Neue',sans-serif;font-size:10px;color:var(--bright);line-height:1;}

.cmd-stat.gld{border-top-color:var(--gold);}
.cmd-stat.blu{border-top-color:var(--bl);}
.cmd-stat.alr{border-top-color:var(--orange);}
.cmd-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--bright);line-height:1;letter-spacing:2px;}
.cmd-stat.gld .cmd-val{color:var(--gold);}
.cmd-stat.blu .cmd-val{color:var(--bl);}
.cmd-stat.alr .cmd-val{color:var(--orange);}
.cmd-lbl{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.cmd-crew-row{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:8px 10px;margin-bottom:4px;}
.cmd-crew-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;flex:1;}
.cmd-crew-meta{font-family:var(--mono);font-size:7px;color:var(--muted);letter-spacing:1px;}
.cmd-bar-wrap{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px;}
.cmd-bar{height:100%;background:linear-gradient(90deg,var(--pine),var(--bright));border-radius:2px;}
.cmd-trees{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--bright);}
.cmd-coming{background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--border);border-radius:3px;padding:9px 11px;margin-bottom:5px;opacity:.4;}
.cmd-coming-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.cmd-coming-val{font-size:11px;color:var(--muted);font-style:italic;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--pine);color:white;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 16px;border-radius:3px;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.person-stats,.spray-sum-grid{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}.fg.full{grid-column:1;}}
/* Lab (experiments) */
.exp-tile{background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;padding:10px 16px;border-radius:3px;cursor:pointer;transition:all .2s;}
.exp-tile:hover:not(:disabled){border-color:var(--pine);color:var(--bright);}
.exp-tile.active{border-color:var(--bright);background:rgba(141,201,124,.08);color:var(--bright);}
.exp-tile.locked,.exp-tile:disabled{opacity:.4;cursor:not-allowed;}
.chess-status{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.chess-status .turn-w{color:var(--cream);}
.chess-status .turn-b{color:var(--gold);}
.chess-status .check{color:var(--orange);}
.chess-status .mate{color:var(--red);font-weight:bold;}
.chess-status .draw{color:var(--bl);}
.chess-board-wrap{max-width:420px;margin:0 auto 10px;}
.chess-board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;aspect-ratio:1;border:2px solid var(--border);box-shadow:0 0 0 1px var(--moss),0 4px 20px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.cs{display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;font-size:min(8vw,34px);line-height:1;}
.cs.light{background:#3d4a2e;}
.cs.dark{background:#1a2214;}
.cs.sel{box-shadow:inset 0 0 0 3px var(--bright);}
.cs.check{background:#7a2020!important;}
.cs .cp-w{color:#f0ebd8;text-shadow:0 0 1px #000,0 1px 1px #000,-1px 0 1px #000,1px 0 1px #000;font-weight:bold;}
.cs .cp-b{color:#0a0a0a;text-shadow:0 0 1px #d0c8a8,0 1px 0 #c9a84c,-1px 0 0 #c9a84c,1px 0 0 #c9a84c;font-weight:bold;}
.cs .dot{position:absolute;width:28%;height:28%;background:rgba(141,201,124,.55);border-radius:50%;pointer-events:none;}
.cs .ring{position:absolute;inset:6%;border:3px solid rgba(184,50,50,.7);border-radius:50%;pointer-events:none;}
.cs .coord{position:absolute;font-family:var(--mono);font-size:8px;color:rgba(221,216,196,.35);pointer-events:none;}
.cs .coord.file{bottom:2px;right:3px;}
.cs .coord.rank{top:2px;left:3px;}
.chess-controls{display:flex;gap:6px;margin-bottom:12px;}
.chess-btn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;padding:10px;border-radius:3px;cursor:pointer;transition:all .2s;}
.chess-btn:hover{border-color:var(--pine);color:var(--bright);}
.chess-btn.danger:hover{border-color:var(--red);color:var(--red);}
.chess-history-wrap{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:10px 12px;}
.chess-history{max-height:150px;overflow-y:auto;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--cream);}
.chess-history .mv-pair{display:flex;gap:10px;}
.chess-history .mv-num{color:var(--muted);min-width:24px;}
.chess-history .mv-w{min-width:60px;color:var(--cream);}
.chess-history .mv-b{color:var(--gold);}
.chess-history .empty{color:var(--muted);font-style:italic;}
.exp-promote{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px;}
.exp-promote-inner{background:var(--panel);border:1px solid var(--pine);border-radius:4px;padding:20px;width:100%;max-width:320px;}
.promote-choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.promote-choice{background:var(--card);border:1px solid var(--border);cursor:pointer;padding:12px;border-radius:3px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;}
.promote-choice:hover{border-color:var(--bright);}
.promote-choice .glyph{font-size:30px;line-height:1;}
.promote-choice .label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.chess-mode-bar{display:flex;gap:4px;margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:3px;padding:3px;}
.chess-mode-btn{flex:1;background:transparent;border:none;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:9px;border-radius:2px;cursor:pointer;transition:all .2s;}
.chess-mode-btn.active{background:var(--pine);color:white;}
#chess-lobby{display:flex;flex-direction:column;gap:10px;}
#chess-lobby .chess-btn.primary{background:var(--pine);color:white;border-color:var(--pine);}
#chess-lobby .chess-btn.primary:hover{background:var(--leaf);border-color:var(--leaf);}
.chess-lobby-section{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:12px;}
.chess-lobby-header{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--leaf);margin-bottom:8px;}
.chess-lobby-list{display:flex;flex-direction:column;gap:6px;}
.chess-lobby-empty{color:var(--muted);font-family:var(--mono);font-size:10px;font-style:italic;padding:4px 0;}
.chess-lobby-item{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.chess-lobby-item .chess-lobby-meta{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;flex-wrap:wrap;}
.chess-lobby-item .nm{color:var(--cream);font-weight:600;letter-spacing:1px;font-size:13px;}
.chess-lobby-item .nm.muted{color:var(--muted);font-weight:400;}
.chess-lobby-item .vs{color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:2px;}
.chess-lobby-item .yourturn{color:var(--bright);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.chess-lobby-item .theirturn{color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.chess-lobby-item .chess-lobby-actions{display:flex;gap:4px;}
.chess-lobby-item .chess-btn{padding:6px 10px;font-size:10px;letter-spacing:2px;flex:0 0 auto;}
#chess-opponent-bar{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:8px 12px;margin-bottom:8px;}
#chess-opponent-bar .opp-row{display:flex;align-items:center;gap:10px;padding:2px 0;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
#chess-opponent-bar .opp-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);min-width:48px;}
#chess-opponent-bar .opp-name{color:var(--cream);font-weight:600;letter-spacing:1px;}
#chess-opponent-bar .opp-row.me .opp-name{color:var(--bright);}
.species-upload-zone{background:var(--card);border:2px dashed var(--border);border-radius:3px;padding:34px 20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s;}
.species-upload-zone:hover{border-color:var(--pine);background:rgba(74,103,65,.08);}
.species-upload-zone .upload-zone-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--cream);letter-spacing:1px;margin-bottom:4px;}
.species-upload-zone .upload-zone-sub{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.species-thumb{display:block;max-width:100%;max-height:240px;margin:0 auto 12px;border:1px solid var(--border);border-radius:3px;}
.ai-spin{font-family:var(--mono);font-size:10px;color:var(--leaf);letter-spacing:3px;padding:18px;text-align:center;animation:aipulse 1.4s ease-in-out infinite;}
@keyframes aipulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.species-result{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:14px;}
.species-header{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.species-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--bright);line-height:1.1;}
.species-latin{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;}
.species-conf{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.species-conf-label{color:var(--muted);}
.species-section{margin-top:10px;}
.species-section-hdr{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--leaf);margin-bottom:4px;}
.species-section-body{color:var(--cream);font-size:13px;line-height:1.5;}
.species-none-wrap{background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--orange);border-radius:3px;padding:14px;}
.species-none{color:var(--orange);font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.species-none-body{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.4;}
.species-try-again{margin-top:12px;}
.chess-lb{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.chess-lb th{text-align:right;font-weight:normal;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 6px;border-bottom:1px solid var(--border);}
.chess-lb th:first-child{text-align:left;padding-left:0;}
.chess-lb td{text-align:right;padding:6px;color:var(--cream);}
.chess-lb td.nm{text-align:left;padding-left:0;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;}
.chess-lb td.rank{width:18px;text-align:left;color:var(--muted);font-size:9px;padding-left:0;padding-right:6px;}
.chess-lb tr.me td{color:var(--bright);}
.chess-lb tr.me td.nm{color:var(--bright);}
.chess-lb tr.me td.rank{color:var(--bright);}
.chess-lb tbody tr{border-bottom:1px solid rgba(37,48,32,.5);}
.chess-lb tbody tr:last-child{border-bottom:none;}
.chess-recent-list{display:flex;flex-direction:column;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
.chess-recent-item{padding:6px 0;color:var(--cream);border-bottom:1px solid rgba(37,48,32,.3);letter-spacing:.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.chess-recent-item:last-child{border-bottom:none;}
.chess-recent-item .winner{color:var(--bright);font-weight:600;}
.chess-recent-item .loser{color:var(--muted);}
.chess-recent-item .verb{color:var(--leaf);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.chess-recent-item .draw{color:var(--bl);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.chess-lb td.pfpc{width:30px;padding:4px 4px 4px 0;}
.chess-lb td.pfpc .pfp-emoji{width:24px;height:24px;font-size:12px;}
.chess-recent-item .pfp-emoji{width:22px;height:22px;font-size:11px;}
#chess-opponent-bar .pfp-emoji{width:32px;height:32px;font-size:14px;}
.chess-lobby-item .pfp-emoji{width:26px;height:26px;font-size:12px;}
.chess-lb td.st-w{color:var(--bright);font-weight:bold;letter-spacing:1px;}
.chess-lb td.st-l{color:var(--orange);font-weight:bold;letter-spacing:1px;}
.chess-lb td.st-d{color:var(--bl);font-weight:bold;letter-spacing:1px;}
.chess-lb td.st-none{color:var(--muted);}
.h2h-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.h2h-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:3px;}
.h2h-row .pfp-emoji{width:24px;height:24px;font-size:12px;flex-shrink:0;}
.h2h-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--cream);letter-spacing:1px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.h2h-score{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:3px 8px;border-radius:3px;flex-shrink:0;}
.h2h-score.lead{color:var(--bright);background:rgba(141,201,124,.12);}
.h2h-score.behind{color:var(--orange);background:rgba(212,131,70,.12);}
.h2h-score.even{color:var(--muted);background:rgba(108,108,100,.12);}
.h2h-total{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;flex-shrink:0;}
/* AI Chatbot */
#chat-fab{position:fixed;bottom:16px;right:16px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--pine),var(--leaf));border:1px solid var(--bright);color:white;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;z-index:200;box-shadow:0 4px 18px rgba(0,0,0,.5),0 0 18px rgba(141,201,124,.25);display:none;align-items:center;justify-content:center;transition:transform .15s;}
#chat-fab:hover{transform:scale(1.05);}
#chat-fab.show{display:flex;}
#chat-fab .fab-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange);}
#chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end;justify-content:center;}
#chat-overlay.show{display:flex;}
#chat-window{background:var(--panel);border:1px solid var(--moss);border-radius:6px 6px 0 0;width:100%;max-width:560px;height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.6);}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--deep);}
.chat-header-left{display:flex;align-items:center;gap:9px;}
.chat-orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--bright),var(--pine) 60%,var(--moss));box-shadow:0 0 12px rgba(141,201,124,.4);animation:orbPulse 2.5s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{box-shadow:0 0 10px rgba(141,201,124,.3);}50%{box-shadow:0 0 18px rgba(141,201,124,.55);}}
.chat-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:white;line-height:1;}
.chat-sub{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--leaf);margin-top:2px;}
.chat-close{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:14px;width:28px;height:28px;border-radius:3px;cursor:pointer;}
.chat-close:hover{color:var(--red);border-color:var(--red);}
.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--black);}
.chat-msg{max-width:85%;padding:9px 12px;border-radius:6px;font-size:13px;line-height:1.45;word-wrap:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--pine);color:white;border-bottom-right-radius:2px;}
.chat-msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--cream);border-bottom-left-radius:2px;}
.chat-msg.system{align-self:center;background:rgba(74,127,160,.12);border:1px solid var(--blue);color:var(--bl);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:6px 10px;border-radius:3px;max-width:100%;}
.chat-msg.tool{align-self:flex-start;background:rgba(201,168,76,.08);border:1px solid var(--gold);border-left:2px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 10px;border-radius:3px;}
.chat-msg.error{align-self:flex-start;background:rgba(184,50,50,.1);border:1px solid var(--red);color:var(--red);font-size:11px;}
.chat-msg .msg-attachment{margin-top:6px;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.chat-msg .msg-attachment img{max-width:100%;max-height:200px;display:block;}
.chat-msg .msg-attachment.pdf{padding:8px 10px;font-family:var(--mono);font-size:10px;color:var(--cream);background:var(--deep);}
.chat-typing{align-self:flex-start;display:flex;gap:4px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--leaf);animation:typingDot 1.2s ease-in-out infinite;}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px 0;}
.chat-sugg{background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 9px;border-radius:14px;cursor:pointer;transition:all .15s;}
.chat-sugg:hover{border-color:var(--bright);color:var(--bright);}
.chat-attachments-strip{display:flex;flex-wrap:wrap;gap:6px;padding:6px 14px 0;}
.chat-attach-pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--leaf);border-radius:14px;padding:4px 8px;font-family:var(--mono);font-size:9px;color:var(--cream);}
.chat-attach-pill img{width:24px;height:24px;border-radius:3px;object-fit:cover;}
.chat-attach-pill .x{cursor:pointer;color:var(--red);font-weight:bold;margin-left:2px;}
.chat-input-bar{display:flex;align-items:flex-end;gap:6px;padding:10px 12px 12px;border-top:1px solid var(--border);background:var(--deep);}
.chat-attach-btn{background:var(--card);border:1px solid var(--border);color:var(--leaf);width:36px;height:36px;border-radius:4px;cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chat-attach-btn:hover{border-color:var(--leaf);background:rgba(107,158,94,.1);}
.chat-textarea{flex:1;background:var(--card);border:1px solid var(--border);color:var(--cream);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 11px;border-radius:4px;resize:none;min-height:36px;max-height:90px;outline:none;}
.chat-textarea:focus{border-color:var(--leaf);}
.chat-send{background:var(--pine);border:none;color:white;width:36px;height:36px;border-radius:4px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.chat-send:hover:not(:disabled){background:var(--leaf);}
.chat-send:disabled{background:var(--moss);cursor:not-allowed;opacity:.5;}
.chat-action-card{background:var(--card);border:1px solid var(--border);border-left:2px solid var(--bright);border-radius:3px;padding:9px 11px;margin-top:5px;font-size:12px;line-height:1.5;}
